name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Write local.properties for Android build
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Analyze Flutter Code
        run: flutter analyze --no-fatal-infos || true

      - name: Fix Gradle Wrapper Line Endings & Permissions
        run: |
          sed -i 's/\r//' android/gradlew
          chmod +x android/gradlew

      - name: Build Release APK
        run: |
          flutter build apk --release
          echo "=== APK Search ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-tracker-release-apk
          path: "**/*.apk"
          if-no-files-found: error
          retention-days: 14
